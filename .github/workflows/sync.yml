name: Teams Sync

# Pulls new photos and messages from the family Microsoft Teams channel
# into the repo every 30 minutes (and on manual dispatch). Secrets are
# read from GitHub Actions secrets — never committed. See SETUP-AZURE.md
# for one-time configuration.

on:
  schedule:
    # Every 30 minutes. Cron is in UTC.
    - cron: "*/30 * * * *"
  workflow_dispatch:

# Only one sync at a time; queue, never cancel, so partial progress
# from one run can finish persisting before the next starts.
concurrency:
  group: teams-sync
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip + InsightFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.insightface
          key: sync-deps-${{ runner.os }}-${{ hashFiles('requirements-sync.txt') }}
          restore-keys: |
            sync-deps-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Face recognition is optional. If it fails to install for any
          # reason (binary wheel, model download, etc.) the sync still
          # runs and just skips face suggestions.
          pip install -r requirements-sync.txt || pip install requests Pillow

      - name: Run sync
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          TEAMS_TEAM_ID: ${{ secrets.TEAMS_TEAM_ID }}
          TEAMS_CHANNEL_ID: ${{ secrets.TEAMS_CHANNEL_ID }}
        run: python sync_teams.py

      - name: Commit any new media, content, or state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet && git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ media/
          git commit -m "chore(sync): pull new items from Teams"
          # Retry push on conflict — a parallel deploy may have advanced main.
          for i in 1 2 3; do
            if git push origin HEAD:main; then break; fi
            sleep $((i * 2))
            git pull --rebase origin main
          done
